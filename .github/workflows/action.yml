name: CI - Kubernetes Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run Tests
        run: |
          cd ./MyService
          chmod +x gradlew
          ./gradlew test

      - name: Build Docker image (local)
        run: |
          cd ./MyService
          docker build -t myservice:latest .

  build-and-deploy:
    name: Build and Deploy to Minikube
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: adopt
          java-version: '17'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Minikube
        uses: medyagh/setup-minikube@master
        with:
          kubernetes-version: 'v1.27.0' # optionnel : adapter selon besoin

      - name: Use Minikube Docker daemon
        run: |
          eval $(minikube -p minikube docker-env)

      - name: Build Docker image into Minikube's Docker
        run: |
          cd ./MyService
          docker build -t myservice:latest .

      - name: Deploy manifests to Minikube
        run: |
          kubectl apply -f k8s/MS-deploy.yml
          kubectl apply -f k8s/MS-service.yml

      - name: Wait for pods to be ready
        run: |
          kubectl wait --for=condition=Ready --timeout=120s pod -l app=postgres
          kubectl wait --for=condition=Ready --timeout=120s pod -l app=carservice
          kubectl get pods -o wide

      - name: List services and get carservice URL
        run: |
          minikube service list
          minikube service carservice --url || true

      - name: Test Kubernetes service URL
        run: |
          # Exemple de test simple : récupérer l'URL et appeler le service
          URL=$(minikube service carservice --url)
          echo "Service URL: $URL"
          curl --fail --retry 5 --retry-delay 2 "$URL/health" || (echo "Service test failed" && exit 1)
