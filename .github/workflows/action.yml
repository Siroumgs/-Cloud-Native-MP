name: CI - Kubernetes Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run Tests
        run: |
          cd MyService
          chmod +x gradlew
          ./gradlew test

      - name: Build Docker image (local)
        run: |
          cd MyService
          docker build -t myservice:latest .

  build-and-deploy:
    name: Build and Deploy to Minikube
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: adopt
          java-version: '17'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Minikube
        uses: medyagh/setup-minikube@master
        with:
          driver: docker

      - name: Build Docker image inside Minikube
        run: |
          eval $(minikube docker-env)
          cd MyService
          docker build -t myservice:latest .

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f MyService/k8s/MS-deploy.yml
          kubectl apply -f MyService/k8s/MS-service.yml

      - name: Wait for myservice pod to be ready
        run: |
          kubectl wait --for=condition=Ready --timeout=120s pod -l app=myservice

      - name: Show services
        run: |
          kubectl get svc
          kubectl get pods -o wide

      - name: Get service URL
        run: |
          minikube service list
          minikube service myservice --url
