name: CI

on:
  pull_request:

jobs:
  job1:
    runs-on: ubuntu-latest
    name: Build and Deploy to Minikube

    steps:
      # ------------------------------
      # 1. Checkout du code
      # ------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------
      # 2. Setup Java
      # ------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ------------------------------
      # 3. Start Minikube
      # ------------------------------
      - name: Start Kubernetes minikube
        uses: medyagh/setup-minikube@master
        with:
          driver: docker

      - name: Try the Kubernetes cluster
        run: kubectl get pods -A

      # ------------------------------
      # 4. Build + Tests + Docker image
      # ------------------------------
      - name: Build, test and build docker image
        run: |
          export SHELL=/bin/bash
          eval $(minikube -p minikube docker-env)

          cd MyService
          chmod +x gradlew
          ./gradlew build

          docker build -t myservice:latest .

          echo "Images disponibles :"
          docker images

      # ------------------------------
      # 5. Déploiement Kubernetes
      # ------------------------------
      - name: Deploy the image to minikube
        run: |
          kubectl apply -f MyService/k8s/MS-deploy.yml
          kubectl apply -f MyService/k8s/MS-service.yml

      # ------------------------------
      # 6. Debug pods
      # ------------------------------
      - name: Debug pods
        run: |
          kubectl get pods -o wide

      - name: Show logs of myservice
        run: |
          kubectl logs -l app=myservice --tail=200 || true

      # ------------------------------
      # 7. Attendre que le pod soit prêt
      # ------------------------------
      - name: Wait for myservice pod to be ready
        run: |
          kubectl wait --for=condition=Ready --timeout=120s pod -l app=myservice

      # ------------------------------
      # 8. Récupérer l’URL du service
      # ------------------------------
      - name: Get Kubernetes service URL
        id: svc-url
        run: |
          URL=$(minikube service myservice --url)
          echo "Service URL: $URL"
          echo "SERVICE_URL=$URL" >> $GITHUB_ENV

      # ------------------------------
      # 9. Test automatique avec retry
      # ------------------------------
      - name: Test Kubernetes service URL
        uses: nick-fields/retry@v2
        with:
          timeout_seconds: 10
          max_attempts: 4
          command: |
            echo "Testing service at: $SERVICE_URL"
            curl -f "$SERVICE_URL" || curl -f "$SERVICE_URL/actuator/health"

      # ------------------------------
      # 10. Logs finaux
      # ------------------------------
      - name: Log Kubernetes pods
        run: |
          kubectl logs $(kubectl get pods -l app=myservice -o name)
