name: CI - Kubernetes Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:

  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Run Tests
        run: |
          cd MyService
          chmod +x gradlew
          ./gradlew test

      - name: Build Docker image
        run: |
          cd MyService
          docker build -t myservice:latest .

  deploy-to-minikube:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Minikube
        uses: medyagh/setup-minikube@master

      - name: Load Docker image into Minikube
        run: |
          eval $(minikube docker-env)
          cd MyService
          docker build -t myservice:latest .

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f MyService/k8s/MS-deploy.yml
          kubectl apply -f MyService/k8s/MS-service.yml

      - name: Wait for pods
        run: |
          kubectl wait --for=condition=Ready --timeout=90s pod -l app=myservice
          kubectl get pods

      - name: Get service URL
        run: |
          minikube service list
          minikube service myservice --url
